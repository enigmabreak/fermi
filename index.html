<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download Fermi Studio - The secure coding environment designed for academic integrity.">
    <title>Download Fermi Studio</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #0f172a;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #3b82f6;
                --primary-hover: #60a5fa;
                --bg: #0f172a;
                --text: #f8fafc;
                --card-bg: #1e293b;
                --border: #334155;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }

        p {
            color: var(--text);
            opacity: 0.8;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary);
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .download-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .version-info {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fermi Studio</h1>
        <p>The secure coding environment designed for academic integrity.</p>
        
        <a href="Fermi%20Studio%20Setup%205.6.9.exe" class="download-btn" download>
            Download for Windows
        </a>
        
        <div class="version-info">
            Latest Release: v5.6.9
        </div>
    </div>
</body>
</html>
